name: Deploy n8n on K3s

on:
  push:
    branches:
      - main
    paths:
      - "k3s/n8n/**"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy K3s + Firewall" # Nom du workflow de déploiement du serveur
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Ansible — K3s & UFW
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ansible
        uses: ./.github/actions/ansible-setup

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_PATH }}" > ~/.ssh/id_ansible
          chmod 600 ~/.ssh/id_ansible
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Create inventory
        run: |
          cat > /tmp/inventory.ini <<EOF
          [all]
          k3s-master ansible_host=${{ secrets.SERVER_IP }}

          [all:vars]
          ansible_user=root
          ansible_port=22
          ansible_ssh_private_key_file=~/.ssh/id_ansible
          ansible_python_interpreter=/usr/bin/python3
          ansible_become=true
          ansible_become_method=sudo
          EOF

      - name: Deploy n8n
        env:
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Substituer les placeholders dans les manifests
          mkdir -p /tmp/n8n
          for f in k3s/n8n/*.yaml; do
            sed \
              -e "s|__N8N_ENCRYPTION_KEY__|${N8N_ENCRYPTION_KEY}|g" \
              -e "s|__SERVER_IP__|${SERVER_IP}|g" \
              "$f" > "/tmp/n8n/$(basename $f)"
          done

          # Copier les manifests sur le serveur et appliquer
          ansible -i /tmp/inventory.ini all -m copy \
            -a "src=/tmp/n8n/ dest=/tmp/n8n-manifests/ mode=0600"
          ansible -i /tmp/inventory.ini all -m command \
            -a "kubectl apply -f /tmp/n8n-manifests/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ansible
