name: Deploy ArgoCD on K3s

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/argocd-deploy.yml"
      - "k3s/argocd/**"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy K3s + Firewall"
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Install ArgoCD core
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_PATH }}" > ~/.ssh/id_ansible
          chmod 600 ~/.ssh/id_ansible
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Create inventory
        run: |
          cat > /tmp/inventory.ini <<EOF
          [all]
          k3s-master ansible_host=${{ secrets.SERVER_IP }}

          [all:vars]
          ansible_user=root
          ansible_port=22
          ansible_ssh_private_key_file=~/.ssh/id_ansible
          ansible_python_interpreter=/usr/bin/python3
          ansible_become=true
          ansible_become_method=sudo
          EOF

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Install ArgoCD (core-install)
        run: |
          ansible -i /tmp/inventory.ini all -m shell -a "
            kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f - &&
            kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml &&
            kubectl wait --for=condition=available --timeout=120s deployment/argocd-server -n argocd 2>/dev/null || true &&
            kubectl wait --for=condition=available --timeout=120s deployment/argocd-repo-server -n argocd 2>/dev/null || true
          "

      - name: Apply ArgoCD configuration
        run: |
          ansible -i /tmp/inventory.ini all -m copy \
            -a "src=k3s/argocd/ dest=/tmp/argocd-config/ mode=0600"
          ansible -i /tmp/inventory.ini all -m shell -a "
            kubectl apply -f /tmp/argocd-config/
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ansible
