---
# Traefik (K3s) — accès par IP (sans domaine, sans TLS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: n8n
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web # HTTP port 80
spec:
  rules:
    - http: # Pas de 'host' = Traefik accepte toutes les requêtes (y compris par IP)
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  name: http
