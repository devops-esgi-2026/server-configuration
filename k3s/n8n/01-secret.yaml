---
# Générer la valeur avec : openssl rand -hex 32
# Encoder en base64 avant d'insérer : echo -n "<valeur>" | base64
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: n8n
type: Opaque
stringData:
  encryption-key: "__N8N_ENCRYPTION_KEY__" # Remplacé par le workflow (GitHub Secret)
