---
# Ce fichier est un SealedSecret — chiffré avec la clé publique du cluster.
# La valeur en clair n'est JAMAIS dans Git.
#
# Pour regénérer ce secret :
#   1. kubeseal --fetch-cert --controller-name=sealed-secrets-controller --controller-namespace=kube-system > pub-cert.pem
#   2. kubectl create secret generic n8n-secrets -n n8n \
#        --from-literal=encryption-key="$(openssl rand -hex 32)" \
#        --dry-run=client -o yaml \
#      | kubeseal --cert pub-cert.pem --format yaml > k3s/n8n/01-secret.yaml
#   3. Supprimer pub-cert.pem (facultatif, pas sensible)
#   4. Commiter et pusher ce fichier
#
# PLACEHOLDER — remplacer par le vrai SealedSecret généré via les commandes ci-dessus
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  encryptedData:
    encryption-key: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: n8n-secrets
      namespace: n8n
    type: Opaque
