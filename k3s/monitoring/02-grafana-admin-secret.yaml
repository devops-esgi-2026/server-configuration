---
# SealedSecret para as credenciais de admin do Grafana.
#
# Para gerar este ficheiro, execute:
#
#   kubectl create secret generic grafana-admin-secret \
#     --namespace=monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=SUA_PASSWORD \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name sealed-secrets-controller \
#             --controller-namespace kube-system \
#             --format yaml > k3s/monitoring/02-grafana-admin-secret.yaml
#
# Substitua este ficheiro com o output do comando acima antes de fazer commit.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  encryptedData:
    admin-user: REPLACE_WITH_SEALED_VALUE
    admin-password: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: grafana-admin-secret
      namespace: monitoring
