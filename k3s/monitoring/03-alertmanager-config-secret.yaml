---
# SealedSecret para a configuração completa do Alertmanager (inclui password SMTP).
#
# Para gerar este ficheiro:
#
# 1. Crie o ficheiro de config com a password do Resend:
#
#   cat > /tmp/alertmanager.yaml << 'EOF'
#   global:
#     resolve_timeout: 5m
#     smtp_smarthost: 'smtp.resend.com:587'
#     smtp_from: 'gabrielmoraisdev4@gmail.com'
#     smtp_auth_username: 'resend'
#     smtp_auth_password: 'SUA_RESEND_API_KEY'
#     smtp_require_tls: true
#   route:
#     group_by: ['namespace', 'alertname', 'severity']
#     group_wait: 30s
#     group_interval: 5m
#     repeat_interval: 12h
#     receiver: 'email'
#   receivers:
#     - name: 'email'
#       email_configs:
#         - to: 'g.morais@myskolae.fr'
#           send_resolved: true
#   inhibit_rules:
#     - source_matchers:
#         - severity="critical"
#       target_matchers:
#         - severity="warning"
#       equal: ['namespace', 'alertname']
#   EOF
#
# 2. Crie e sele o secret:
#
#   kubectl create secret generic alertmanager-config-secret \
#     --namespace=monitoring \
#     --from-file=alertmanager.yaml=/tmp/alertmanager.yaml \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name sealed-secrets-controller \
#             --controller-namespace kube-system \
#             --format yaml > k3s/monitoring/03-alertmanager-config-secret.yaml
#
# Substitua este ficheiro com o output do comando acima antes de fazer commit.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-config-secret
  namespace: monitoring
spec:
  encryptedData:
    alertmanager.yaml: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: alertmanager-config-secret
      namespace: monitoring
