# =============================================================================
# Inventory Ansible — K3s Single Node Master
# =============================================================================

[all]
k3s-master ansible_host={{ secrets.SERVER_IP }}

[all:vars]
ansible_user=root
ansible_port=22
ansible_ssh_private_key_file={{ secrets.SSH_KEY_PATH }}
ansible_python_interpreter=/usr/bin/python3
ansible_become=true
ansible_become_method=sudo